<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ciggy Calc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    
    <style>
        :root {
            --bg-color: #0a0a0a; /* Majdnem fekete sötétszürke */
            --accent-red: #ff3b30; /* Apple-stílusú piros */
            --text-color: #ffffff; /* Tiszta fehér */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            text-align: center;
        }
        #amount {
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: -1px;
        }
        /* Piros átmenetes nagy gomb */
        .main-btn {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #ff453a 0%, #bd0000 100%);
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            box-shadow: 0 15px 35px rgba(255, 59, 48, 0.3);
            transition: transform 0.1s;
            cursor: pointer;
            margin-bottom: 4rem;
            text-transform: uppercase;
        }
        .main-btn:active {
            transform: scale(0.94);
            filter: brightness(1.1);
        }
        /* Csak körvonalas visszavonás gomb */
        .undo-btn {
            background: transparent;
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .undo-btn:active {
            background: rgba(255, 59, 48, 0.1);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="amount">0 Ft</div>
        
        <button class="main-btn" onclick="addCiggy()">Take a C</button>
        
        <br>
        
        <button class="undo-btn" onclick="undo()">Visszavonás</button>
    </div>

    <script>
        let total = parseFloat(localStorage.getItem('ciggyTotal')) || 0;
        const price = 132.5;

        updateDisplay();

        function addCiggy() {
            // Rezgés iPhone-on (Haptic Feedback)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(15); 
            }
            total += price;
            save();
        }

        function undo() {
            if (total >= price) {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate([10, 30, 10]); // Dupla rövid rezgés
                }
                total -= price;
                save();
            }
        }

        function save() {
            localStorage.setItem('ciggyTotal', total);
            updateDisplay();
        }

        function updateDisplay() {
            // Magyar formátum (szóköz ezres elválasztóval)
            document.getElementById('amount').innerText = total.toLocaleString('hu-HU', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " Ft";
        }
    </script>
</body>
</html>
