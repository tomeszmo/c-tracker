<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cigarette Counter</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ciggy Calc">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .container {
            text-align: center;
            padding-bottom: 50px;
        }
        #amount {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--accent-color);
        }
        .main-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #38bdf8 0%, #1d4ed8 100%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            active: transform: scale(0.95);
            transition: transform 0.1s;
            cursor: pointer;
            margin-bottom: 3rem;
        }
        .main-btn:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }
        .undo-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .undo-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="amount">0 Ft</div>
        
        <button class="main-btn" onclick="addCiggy()">Take a C</button>
        
        <br>
        
        <button class="undo-btn" onclick="undo()">Visszavonás</button>
    </div>

    <script>
        let total = parseFloat(localStorage.getItem('ciggyTotal')) || 0;
        const price = 132.5;

        // Kezdő érték kiírása
        updateDisplay();

        function addCiggy() {
            total += price;
            save();
        }

        function undo() {
            if (total >= price) {
                total -= price;
                save();
            }
        }

        function save() {
            localStorage.setItem('ciggyTotal', total);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('amount').innerText = total.toLocaleString('hu-HU') + " Ft";
        }
    </script>
</body>
</html>
